name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 3.6.7)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Update version
      run: |
        # Update setup.py
        sed -i "s/version=\"[^"]*\"/version=\"${{ github.event.inputs.version }}\"/" setup.py
        # Update pyproject.toml
        sed -i "s/version = \"[^"]*\"/version = \"${{ github.event.inputs.version }}\"/" pyproject.toml
    
    - name: Commit version bump
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add setup.py pyproject.toml
        git commit -m "Bump version to ${{ github.event.inputs.version }}"
        git push
    
    - name: Create release tag
      run: |
        git tag -a v${{ github.event.inputs.version }} -m "Release version ${{ github.event.inputs.version }}"
        git push origin v${{ github.event.inputs.version }}
    
    - name: Build distributions
      run: |
        python -m pip install build twine
        python -m build
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.event.inputs.version }}
        files: dist/*
        draft: false
        prerelease: false
        body: |
          # PyWebSearch v${{ github.event.inputs.version }}
          
          Release triggered on ${{ github.event.repository.updated_at }}
          
          ## Changes
          See commit history for detailed changes.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
